version: '3.8'

# ─── Local 환경 ───
# 앱 .env.local 변경 필요:
#   FRONT_URL=http://{YOUR_LOCAL_IP}:3100
#   ANDROID_FRONT_URL=http://{YOUR_LOCAL_IP}:3100
#   BACK_URL=http://{YOUR_LOCAL_IP}:5100
#
# 백엔드 .env.local DATABASE_URL을 내부 MySQL로 변경 시:
#   DATABASE_URL=mysql+pymysql://voca:voca!@34@mysql:3306/heyvoca

services:
  front:
    container_name: heyvoca_front_local
    image: whrksp126/heyvoca_front:local
    build:
      context: ./heyvoca_front
      dockerfile: Dockerfile.local
    volumes:
      - ./heyvoca_front:/app
      - /app/node_modules
    networks:
      - heyvoca_local
    restart: unless-stopped

  back:
    container_name: heyvoca_back_local
    image: whrksp126/heyvoca_back:local
    build:
      context: ./heyvoca_back
      dockerfile: Dockerfile.local
    env_file:
      - ./heyvoca_back/.env.local
    volumes:
      - ./heyvoca_back:/app
    networks:
      - heyvoca_local
    depends_on:
      - mysql
      - redis
    restart: always

  nginx:
    container_name: heyvoca_nginx_local
    image: nginx:1.27-alpine
    ports:
      - "3100:80"    # 프론트 (앱 FRONT_URL)
      - "5100:5003"  # 백엔드 (앱 BACK_URL)
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - heyvoca_local
    depends_on:
      - front
      - back
    restart: always

  mysql:
    container_name: heyvoca_mysql_local
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: heyvoca
      MYSQL_USER: voca
      MYSQL_PASSWORD: "voca!@34"
    ports:
      - "3310:3306"  # 외부에서 직접 접근 시 3310 사용
    volumes:
      - mysql_local_data:/var/lib/mysql
    networks:
      - heyvoca_local
    restart: always

  redis:
    container_name: heyvoca_redis_local
    image: redis:latest
    ports:
      - "6380:6379"
    networks:
      - heyvoca_local
    restart: always

networks:
  heyvoca_local:
    driver: bridge

volumes:
  mysql_local_data:
