version: '3.8'

services:
  front-end:
    container_name: heyvoca_front_dev
    image: whrksp126/heyvoca_front:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
      platforms: 
        - linux/amd64
    ports:
      - "3002:3000"
    env_file:
      - .env.dev
    networks:
      - heyvoca_front_dev_network
    restart: unless-stopped

networks:
  heyvoca_front_dev_network:
    driver: bridge
