version: "3.8"
services:
  front-prod:
    image: whrksp126/heyvoca_front:prod
    container_name: heyvoca_front_prod
    build:
      context: .
      dockerfile: Dockerfile
      platforms: [ linux/amd64 ]
      args:
        # ← 빌드 타임에만 쓰임 (Vite용)
        VITE_BACKEND_URL: https://heyvoca-back.ghmate.com
        VITE_DEBUG: "false"
        VITE_ENV: production
        NODE_ENV: production
    ports:
      - "3000:80"
    restart: unless-stopped

