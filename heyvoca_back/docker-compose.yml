version: '3.8'

services:
  web:
    image: whrksp126/heyvoca_back:main
    container_name: heyvoca_back_prod
    ports:
      - "5006:5000"
    env_file:
      - .env.prod
    networks:
      - heyvoca_back_prod_network
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:latest
    container_name: heyvoca_redis_prod
    ports:
      - "6382:6379"
    networks:
      - heyvoca_back_prod_network
    restart: always

networks:
  heyvoca_back_prod_network:
    name: heyvoca_back_prod_network