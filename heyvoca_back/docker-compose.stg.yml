version: '3.8'

services:
  web:
    image: whrksp126/heyvoca_back:stg
    container_name: heyvoca_back_stg
    build:
      context: .
      dockerfile: Dockerfile.stg
      platforms: 
        - linux/amd64
    ports:
      - "5001:5000"
    env_file:
      - .env.stg
    networks:
      - heyvoca_back_stg_network
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:latest
    container_name: heyvoca_redis_stg
    ports:
      - "6381:6379"
    networks:
      - heyvoca_back_stg_network
    restart: always

networks:
  heyvoca_back_stg_network:
    name: heyvoca_back_stg_network