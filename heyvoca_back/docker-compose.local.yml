version: '3.8'

services:
  web:
    image: whrksp126/heyvoca_back:local
    container_name: heyvoca_back_local
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "5003:5000"
    env_file:
      - .env.local
    volumes:
      - .:/app
    networks:
      - heyvoca_back_local_network
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:latest
    container_name: heyvoca_redis_local
    ports:
      - "6379:6379"
    networks:
      - heyvoca_back_local_network
    restart: always

networks:
  heyvoca_back_local_network:
    name: heyvoca_back_local_network