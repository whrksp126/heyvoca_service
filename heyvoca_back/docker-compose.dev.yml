version: '3.8'

services:
  web:
    image: whrksp126/heyvoca_back:dev
    container_name: heyvoca_back_dev
    build:
      context: .
      dockerfile: Dockerfile.dev
      platforms: 
        - linux/amd64
    ports:
      - "5002:5000"
    env_file:
      - .env.dev
    networks:
      - heyvoca_back_dev_network
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:latest
    container_name: heyvoca_redis_dev
    ports:
      - "6380:6379"
    networks:
      - heyvoca_back_dev_network
    restart: always

networks:
  heyvoca_back_dev_network:
    name: heyvoca_back_dev_network